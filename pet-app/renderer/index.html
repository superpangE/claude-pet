<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Claude Pet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="pet" class="pet state-idle" data-state="idle">
      <div id="session-badge" class="session-badge" aria-hidden="true"></div>

      <!-- ===================== WORKING (default; replaced by working.gif when present) ===================== -->
      <svg
        class="scene scene-working"
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <ellipse cx="100" cy="170" rx="62" ry="6" fill="#000" opacity=".18" />

        <g class="loaf-typing">
          <!-- loaf body -->
          <path
            d="M40 158
               C 40 116, 70 100, 100 100
               C 130 100, 160 116, 160 158
               Z"
            fill="#F5A65B"
            stroke="#5C4030"
            stroke-width="2.2"
            stroke-linejoin="round"
          />
          <!-- belly highlight -->
          <ellipse cx="100" cy="148" rx="42" ry="10" fill="#FFD6A5" opacity=".7" />

          <!-- ears (perked, slightly forward) -->
          <path d="M76 102 L 72 80 L 90 100 Z" fill="#F5A65B" stroke="#5C4030" stroke-width="2.2" stroke-linejoin="round" />
          <path d="M124 102 L 128 80 L 110 100 Z" fill="#F5A65B" stroke="#5C4030" stroke-width="2.2" stroke-linejoin="round" />
          <path d="M78 100 L 76 88 L 84 100 Z" fill="#FFB6C1" />
          <path d="M122 100 L 124 88 L 116 100 Z" fill="#FFB6C1" />

          <!-- cheeks -->
          <ellipse cx="80" cy="132" rx="7" ry="4" fill="#FFB6C1" opacity=".75" />
          <ellipse cx="120" cy="132" rx="7" ry="4" fill="#FFB6C1" opacity=".75" />

          <!-- focused open eyes (small dots) -->
          <circle cx="86" cy="124" r="2.6" fill="#5C4030" />
          <circle cx="114" cy="124" r="2.6" fill="#5C4030" />

          <!-- nose + tiny mouth -->
          <path d="M97 132 L 103 132 L 100 135 Z" fill="#E27D7D" stroke="#5C4030" stroke-width="1" stroke-linejoin="round" />
          <path d="M100 135 Q 96 138 94 137" stroke="#5C4030" stroke-width="1.3" fill="none" stroke-linecap="round" />
          <path d="M100 135 Q 104 138 106 137" stroke="#5C4030" stroke-width="1.3" fill="none" stroke-linecap="round" />

          <!-- whiskers -->
          <path d="M72 132 L 58 130 M72 136 L 58 138" stroke="#5C4030" stroke-width="1" stroke-linecap="round" />
          <path d="M128 132 L 142 130 M128 136 L 142 138" stroke="#5C4030" stroke-width="1" stroke-linecap="round" />

          <!-- paws tapping a keyboard -->
          <g class="paw paw-left">
            <ellipse cx="78" cy="156" rx="9" ry="5" fill="#F5A65B" stroke="#5C4030" stroke-width="1.6" />
          </g>
          <g class="paw paw-right">
            <ellipse cx="122" cy="156" rx="9" ry="5" fill="#F5A65B" stroke="#5C4030" stroke-width="1.6" />
          </g>
        </g>

        <!-- thinking dots floating up -->
        <g class="dots">
          <circle class="dot d1" cx="146" cy="92" r="3" fill="#5C4030" />
          <circle class="dot d2" cx="156" cy="78" r="3.5" fill="#5C4030" />
          <circle class="dot d3" cx="166" cy="62" r="4" fill="#5C4030" />
        </g>
      </svg>

      <!-- ===================== IDLE ===================== -->
      <svg
        class="scene scene-idle"
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <ellipse cx="100" cy="170" rx="62" ry="6" fill="#000" opacity=".18" />

        <g class="loaf-breathe">
          <!-- loaf body (one big rounded shape) -->
          <path
            d="M40 158
               C 40 116, 70 100, 100 100
               C 130 100, 160 116, 160 158
               Z"
            fill="#F5A65B"
            stroke="#5C4030"
            stroke-width="2.2"
            stroke-linejoin="round"
          />
          <!-- belly highlight -->
          <ellipse cx="100" cy="148" rx="42" ry="10" fill="#FFD6A5" opacity=".7" />

          <!-- tail wrapping front -->
          <path
            d="M40 154 Q 50 168 90 158"
            stroke="#F5A65B"
            stroke-width="14"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M40 154 Q 50 168 90 158"
            stroke="#5C4030"
            stroke-width="2.2"
            fill="none"
            stroke-linecap="round"
            opacity=".0"
          />

          <!-- ears -->
          <path d="M76 104 L 70 84 L 88 100 Z" fill="#F5A65B" stroke="#5C4030" stroke-width="2.2" stroke-linejoin="round" />
          <path d="M124 104 L 130 84 L 112 100 Z" fill="#F5A65B" stroke="#5C4030" stroke-width="2.2" stroke-linejoin="round" />
          <path d="M78 100 L 76 90 L 84 100 Z" fill="#FFB6C1" />
          <path d="M122 100 L 124 90 L 116 100 Z" fill="#FFB6C1" />

          <!-- closed-eye smile face -->
          <!-- cheeks -->
          <ellipse cx="80" cy="132" rx="7" ry="4" fill="#FFB6C1" opacity=".75" />
          <ellipse cx="120" cy="132" rx="7" ry="4" fill="#FFB6C1" opacity=".75" />

          <!-- happy closed eyes ^_^ -->
          <path d="M80 122 q 6 -7 12 0" stroke="#5C4030" stroke-width="2.4" fill="none" stroke-linecap="round" />
          <path d="M108 122 q 6 -7 12 0" stroke="#5C4030" stroke-width="2.4" fill="none" stroke-linecap="round" />

          <!-- nose + tiny smile -->
          <path d="M97 132 L 103 132 L 100 135 Z" fill="#E27D7D" stroke="#5C4030" stroke-width="1" stroke-linejoin="round" />
          <path d="M100 135 Q 96 139 93 137" stroke="#5C4030" stroke-width="1.4" fill="none" stroke-linecap="round" />
          <path d="M100 135 Q 104 139 107 137" stroke="#5C4030" stroke-width="1.4" fill="none" stroke-linecap="round" />

          <!-- whiskers -->
          <path d="M72 132 L 58 130 M72 136 L 58 138" stroke="#5C4030" stroke-width="1" stroke-linecap="round" />
          <path d="M128 132 L 142 130 M128 136 L 142 138" stroke="#5C4030" stroke-width="1" stroke-linecap="round" />
        </g>

        <!-- floating Z's -->
        <g class="zzz">
          <text class="z z1" x="138" y="92"  font-family="system-ui" font-size="16" font-weight="800" fill="#5C4030">z</text>
          <text class="z z2" x="148" y="74"  font-family="system-ui" font-size="20" font-weight="800" fill="#5C4030">z</text>
          <text class="z z3" x="160" y="54"  font-family="system-ui" font-size="26" font-weight="800" fill="#5C4030">Z</text>
        </g>
      </svg>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
