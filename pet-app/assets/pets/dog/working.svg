<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <ellipse cx="100" cy="170" rx="62" ry="6" fill="#000" opacity=".18" />
  <g class="loaf-typing">
    <path d="M40 158 C 40 116, 70 100, 100 100 C 130 100, 160 116, 160 158 Z"
