    <ellipse cx="100" cy="148" rx="42" ry="10" fill="#ECD2A8" opacity=".7" />
    <!-- floppy ears (hanging down) -->
    <path d="M70 100 Q 56 102 58 130 Q 68 138 80 132 Q 82 115 82 102 Z"
          fill="#A06A3F" stroke="#5C3A20" stroke-width="2.2" stroke-linejoin="round" />
    <path d="M130 100 Q 144 102 142 130 Q 132 138 120 132 Q 118 115 118 102 Z"
          fill="#A06A3F" stroke="#5C3A20" stroke-width="2.2" stroke-linejoin="round" />
    <!-- cheeks -->
    <ellipse cx="82" cy="138" rx="6" ry="3" fill="#E8A88A" opacity=".6" />
    <ellipse cx="118" cy="138" rx="6" ry="3" fill="#E8A88A" opacity=".6" />
    <!-- eyes (focused) -->
    <circle cx="88" cy="126" r="2.8" fill="#3A2515" />
    <circle cx="112" cy="126" r="2.8" fill="#3A2515" />
    <!-- nose (bigger, dog-style) -->
    <ellipse cx="100" cy="136" rx="4.5" ry="3.2" fill="#3A2515" />
    <!-- mouth -->
    <path d="M100 139 L 100 142" stroke="#3A2515" stroke-width="1.4" stroke-linecap="round" />
    <path d="M100 142 Q 94 145 92 142" stroke="#3A2515" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M100 142 Q 106 145 108 142" stroke="#3A2515" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <!-- paws -->
    <g class="paw paw-left">
      <ellipse cx="78" cy="156" rx="9" ry="5" fill="#D4A574" stroke="#5C3A20" stroke-width="1.6" />
    </g>
    <g class="paw paw-right">
      <ellipse cx="122" cy="156" rx="9" ry="5" fill="#D4A574" stroke="#5C3A20" stroke-width="1.6" />
    </g>
  </g>
  <g class="dots">
    <circle class="dot d1" cx="146" cy="92" r="3" fill="#5C3A20" />
    <circle class="dot d2" cx="156" cy="78" r="3.5" fill="#5C3A20" />
    <circle class="dot d3" cx="166" cy="62" r="4" fill="#5C3A20" />
